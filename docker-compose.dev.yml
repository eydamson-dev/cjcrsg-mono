services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: cjcrsg-be
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: cjcrsg-fe
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:16
    container_name: cjcrsg-db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:

